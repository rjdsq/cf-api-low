name: 聚源精选测速
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  test_and_save:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 测速准备
        run: |
          wget https://github.com/XIU2/CloudflareSpeedTest/releases/download/v2.2.5/CloudflareST_linux_amd64.tar.gz
          tar -zxf CloudflareST_linux_amd64.tar.gz
          chmod +x CloudflareST

      - name: 提取并清洗IP
        run: |
          # 1. 抓取原始订阅
          curl -s https://ip-31c.pages.dev/sub > raw.txt
          # 2. 用 Python 提取纯净地址：去掉备注、去掉端口、去掉IPv6的中括号
          python3 -c "
          import re
          with open('raw.txt', 'r') as f:
              data = f.read()
          # 匹配所有内容，按行处理
          lines = data.strip().split('\n')
          clean_list = set()
          for line in lines:
              # 截取 # 前的内容
              addr = line.split('#')[0].strip()
              # 去除行尾端口 (如 :443)
              addr = re.sub(r':[0-9]+$', '', addr)
              # 去除 IPv6 的中括号
              addr = addr.replace('[', '').replace(']', '')
              if addr:
                  clean_list.add(addr)
          with open('ip.txt', 'w') as f:
              f.write('\n'.join(list(clean_list)))
          "
          echo "提取完成，待测地址总数: $(wc -l < ip.txt)"

      - name: 执行测速
        run: |
          # 直接测速生成的 ip.txt
          ./CloudflareST -f ip.txt -dn 100 -tl 250 -sl 0 -o result.csv
          if [ ! -f result.csv ]; then exit 1; fi

      - name: 格式化展示数据
        run: |
          python3 -c "
          import csv, json, requests, time, os
          CN_MAP = {'BD':'孟加拉国','BE':'比利时','BF':'布基纳法索','BG':'保加利亚','BA':'波黑','BB':'巴巴多斯','WF':'瓦利斯','BL':'圣巴泰勒米','BM':'百慕大','BN':'文莱','BO':'玻利维亚','BH':'巴林','BI':'布隆迪','BJ':'贝宁','BT':'不丹','JM':'牙买加','BV':'布韦岛','BW':'博茨瓦纳','WS':'萨摩亚','BR':'巴西','BS':'巴哈马','JE':'泽西岛','BY':'白俄罗斯','BZ':'伯利兹','RU':'俄罗斯','RW':'卢旺达','RS':'塞尔维亚','TL':'东帝汶','RE':'留尼汪','TM':'土库曼斯坦','TJ':'塔吉克斯坦','RO':'罗马尼亚','TK':'托克劳','GW':'几内亚比绍','GU':'关岛','GT':'危地马拉','GS':'南乔治亚','GR':'希腊','GQ':'赤道几内亚','GP':'瓜德罗普','JP':'日本','GY':'圭亚那','GG':'根西岛','GF':'法属圭亚那','GE':'格鲁吉亚','GD':'格林纳达','GB':'英国','GA':'加蓬','SV':'萨尔瓦多','GN':'几内亚','GM':'冈比亚','GL':'格陵兰','GI':'直布罗陀','GH':'加纳','OM':'阿曼','TN':'突尼斯','JO':'约旦','HR':'克罗地亚','HT':'海地','HU':'匈牙利','HK':'香港','HN':'洪后拉斯','HM':'赫德岛','VE':'委内瑞拉','PR':'波多黎各','PS':'巴勒斯坦','PW':'帕劳','PT':'葡萄牙','SJ':'斯瓦尔巴','PY':'巴拉圭','IQ':'伊拉克','PA':'巴拿马','PF':'法属波利尼西亚','PG':'巴新','PE':'秘鲁','PK':'巴基斯坦','PH':'菲律宾','PN':'皮特凯恩','PL':'波兰','PM':'圣皮埃尔','ZM':'赞比亚','EH':'西撒哈拉','EE':'爱沙尼亚','EG':'埃及','ZA':'南非','EC':'厄瓜多尔','IT':'意大利','VN':'越南','SB':'所罗门','ET':'埃塞俄比亚','SO':'索马里','ZW':'津巴布韦','SA':'沙特','ES':'西班牙','ER':'厄立特里亚','ME':'黑山','MD':'摩尔多瓦','MG':'马达加斯加','MF':'圣马丁','MA':'摩洛哥','MC':'摩纳哥','UZ':'乌兹别克','MM':'缅甸','ML':'马里','MO':'澳门','MN':'蒙古','MH':'马绍尔','MK':'马其顿','MU':'毛里求斯','MT':'马耳他','MW':'马拉维','MV':'马尔代夫','MQ':'马提尼克','MP':'北马里亚纳','MS':'蒙特赛拉特','MR':'毛里塔尼亚','IM':'曼岛','UG':'乌干达','TZ':'坦桑尼亚','MY':'马来西亚','MX':'墨西哥','IL':'以色列','FR':'法国','IO':'英属印度洋','SH':'圣赫勒拿','FI':'芬兰','FJ':'斐济','FK':'福克兰','FM':'密克罗尼西亚','FO':'法罗','NI':'尼加拉瓜','NL':'荷兰','NO':'挪威','NA':'纳米比亚','VU':'瓦努阿图','NC':'新喀里多尼亚','NE':'尼日尔','NF':'诺福克','NG':'尼日利亚','NZ':'新西兰','NP':'尼泊尔','NR':'瑙鲁','NU':'纽埃','CK':'库克群岛','XK':'科索沃','CI':'科特迪瓦','CH':'瑞士','CO':'哥伦比亚','CN':'中国','CM':'喀麦隆','CL':'智利','CC':'科科斯','CA':'加拿大','CG':'刚果','CF':'中非','CD':'刚果金','CZ':'捷克','CY':'塞浦路斯','CX':'圣诞岛','CR':'哥斯达黎加','CW':'库拉索','CV':'佛得角','CU':'古巴','SZ':'斯威士兰','SY':'叙利亚','KG':'吉尔吉斯','KE':'肯尼亚','SR':'苏里南','KI':'基里巴斯','KH':'柬埔寨','KN':'圣基茨','KM':'科摩罗','ST':'圣多美','SK':'斯洛伐克','KR':'韩国','SI':'斯洛文尼亚','KP':'朝鲜','KW':'科威特','SN':'塞内加尔','SM':'圣马力诺','SL':'塞拉利昂','SC':'塞舌尔','KZ':'哈萨克斯坦','KY':'开曼','SG':'新加坡','SE':'瑞典','SD':'苏丹','DO':'多米尼加','DM':'多米尼克','DJ':'吉布提','DK':'丹麦','VG':'英属维尔京','DE':'德国','YE':'也门','DZ':'阿尔及利亚','US':'美国','UY':'乌拉圭','YT':'马约特','UM':'美属离岛','LB':'黎巴嫩','LC':'圣卢西亚','LA':'老挝','TV':'图瓦卢','TW':'台湾','TT':'特立尼达','TR':'土耳其','LK':'斯里兰卡','LI':'列支敦士登','LV':'拉脱维亚','TO':'汤加','LT':'立陶宛','LU':'卢森堡','LR':'利比里亚','LS':'莱索托','TH':'泰国','TF':'法属南部','TG':'多哥','TD':'乍得','TC':'特克斯','LY':'利比亚','VA':'梵蒂冈','VC':'圣文森特','AE':'阿联酋','AD':'安道尔','AG':'安提瓜','AF':'阿富汗','AI':'安圭拉','VI':'美属维尔京','IS':'冰岛','IR':'伊朗','AM':'亚美尼亚','AL':'阿尔巴尼亚','AO':'安哥拉','AQ':'南极洲','AS':'美属萨摩亚','AR':'阿根廷','AU':'澳大利亚','AT':'奥地利','AW':'阿鲁巴','IN':'印度','AX':'奥兰群岛','AZ':'阿塞拜疆','IE':'爱尔兰','ID':'印尼','UA':'乌克兰','QA':'卡塔尔','MZ':'莫桑比克'}
          res = []
          TOKEN = 'c50cf1de215cf1'
          if os.path.exists('result.csv'):
              with open('result.csv', 'r', encoding='utf-8') as f:
                  reader = csv.DictReader(f)
                  ip_col = next((c for c in reader.fieldnames if 'IP' in c.upper()), None)
                  ping_col = next((c for c in reader.fieldnames if '延迟' in c or 'Latency' in c or 'Ping' in c.upper()), None)
                  for row in reader:
                      ip_val = row[ip_col]
                      # 查 IPINFO：去掉 IPv6 中括号
                      q_ip = ip_val.replace('[','').replace(']','')
                      loc_name, cc_code = '未知地区', ''
                      try:
                          r = requests.get(f'https://ipinfo.io/{q_ip}?token={TOKEN}', timeout=5).json()
                          cc = r.get('country', '')
                          cc_code = cc.lower()
                          loc_name = CN_MAP.get(cc, cc)
                      except: pass
                      # 这里决定存入 data.json 的格式：不带端口
                      res.append({'ip': ip_val, 'ping': row[ping_col], 'location': loc_name, 'cc': cc_code})
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(res, f, ensure_ascii=False, indent=2)
          "

      - name: 自动提交结果
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git commit -m "自动更新测速: $(date)" || exit 0
          git push
